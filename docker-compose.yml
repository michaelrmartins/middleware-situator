services:
  app:
    build: .
    container_name: middleware-situator-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_IP_ADDRESS=0.0.0.0
      - SERVER_PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - redis
    networks:
      - situator-network

  redis:
    image: redis:7-alpine
    container_name: middleware-situator-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - situator-network

volumes:
  redis-data:

networks:
  situator-network:
    driver: bridge
